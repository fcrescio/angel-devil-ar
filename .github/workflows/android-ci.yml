name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate AR dependencies
        run: ./scripts/dependency-validation-check.sh

      - name: Build debug
        run: ./gradlew assembleDebug

      - name: Check APK 16 KB alignment
        run: ./scripts/apk-alignment-check.sh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: angel-mirror-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Unit tests
        run: ./gradlew test

      - name: Lint
        run: ./gradlew lint
